<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Preflight</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, system-ui, sans-serif;
      background: #EEEEEE; /* BC-3rd: main page background */
      min-height: 100vh;
      padding: 20px 12px 40px; /* 12px side margins per Even OS layout guidelines */
    }

    /* Navigation-style centered title */
    h1 {
      font-size: 17px;
      font-weight: 400;
      text-align: center;
      margin-bottom: 20px;
      color: #232323; /* TC-1st */
      letter-spacing: -0.17px;
    }

    /* Card: BC-1st white surface, 6px radius per Even OS default */
    .card {
      background: #FFFFFF;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 12px; /* 12px same-subject spacing */
    }

    .row {
      display: flex;
      align-items: center;
      padding: 11px 16px;
      border-bottom: 0.5px solid #E4E4E4; /* BC-4th divider */
      gap: 12px;
    }
    .row:last-child { border-bottom: none; }

    .row label {
      width: 100px;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: -0.15px;
      color: #7B7B7B; /* TC-2nd: secondary label */
      flex-shrink: 0;
    }

    .row input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: -0.15px;
      color: #232323; /* TC-1st: primary text */
      background: transparent;
      text-align: right;
    }

    .row input::placeholder { color: #7B7B7B; } /* TC-2nd */

    /* Primary action button: BC-Highlight (#232323) with arrow prefix per Even OS pattern */
    button {
      width: 100%;
      padding: 16px;
      background: #232323; /* BC-Highlight */
      color: #FFFFFF;      /* TC-Highlight */
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: -0.15px;
      cursor: pointer;
      margin-top: 12px;
    }
    button:disabled {
      background: #E4E4E4; /* BC-4th */
      color: #7B7B7B;      /* TC-2nd */
    }

    #status {
      margin-top: 12px;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 13px;
      letter-spacing: -0.13px;
      text-align: center;
      display: none;
    }
    #status.ok  { background: #FFFFFF; color: #4BB956; } /* TC-Green */
    #status.err { background: #FFFFFF; color: #FF453A; } /* TC-Red */

    .bridge-badge {
      font-size: 11px;
      letter-spacing: -0.11px;
      color: #7B7B7B; /* TC-2nd */
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>Preflight Release</h1>

  <!-- Flight data card -->
  <div class="card">
    <div class="row">
      <label>Flight</label>
      <input id="flt" placeholder="1234" autocomplete="off" autocorrect="off" spellcheck="false" inputmode="numeric">
    </div>
    <div class="row">
      <label>Origin</label>
      <input id="orig" placeholder="LAX" maxlength="4" autocomplete="off" autocorrect="off" spellcheck="false" style="text-transform:uppercase">
    </div>
    <div class="row">
      <label>Destination</label>
      <input id="dest" placeholder="JFK" maxlength="4" autocomplete="off" autocorrect="off" spellcheck="false" style="text-transform:uppercase">
    </div>
    <div class="row">
      <label>Flight Time</label>
      <input id="block" type="text" placeholder="5:30" autocomplete="off" autocorrect="off">
    </div>
    <div class="row">
      <label>Release Fuel</label>
      <input id="fuel" type="number" placeholder="34.5" step="0.1" min="0">
    </div>
    <div class="row">
      <label>Min T/O Fuel</label>
      <input id="minto" type="number" placeholder="28.0" step="0.1" min="0">
    </div>
  </div>

  <!-- Cabin crew card -->
  <div class="card">
    <div class="row">
      <label>FA 1</label>
      <input id="fa1" placeholder="First name" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="row">
      <label>FA 2</label>
      <input id="fa2" placeholder="First name" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="row">
      <label>FA 3</label>
      <input id="fa3" placeholder="First name" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="row">
      <label>FA 4</label>
      <input id="fa4" placeholder="First name" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
  </div>

  <button id="sendBtn" onclick="sendToGlasses()">→ Send to Glasses</button>
  <div id="status"></div>
  <div class="bridge-badge" id="bridgeBadge">Connecting to bridge...</div>

  <script type="module">
    // Preflight — Even HUB plugin for airline pilots
    // Author: flyCeliac
    // Developed with the assistance of Claude (Anthropic)
    //
    // Even Hub SDK — provides waitForEvenAppBridge(), which resolves once the
    // Even HUB iOS app has injected its JS bridge into this WebView.
    import { waitForEvenAppBridge } from 'https://unpkg.com/@evenrealities/even_hub_sdk@0.0.7/dist/index.js';

    let bridge = null;
    const badge = document.getElementById('bridgeBadge');
    const btn   = document.getElementById('sendBtn');

    // Keep the send button disabled until the bridge is ready (or confirmed absent).
    btn.disabled = true;

    waitForEvenAppBridge()
      .then(b => {
        bridge = b;
        badge.textContent = 'Bridge ready';
        btn.disabled = false;
      })
      .catch(e => {
        // No bridge means we're running in a plain browser, not inside Even HUB.
        // Still allow the UI to function so layout can be previewed without glasses.
        badge.textContent = 'Bridge unavailable (preview mode)';
        btn.disabled = false;
      });

    // ── Display geometry ──────────────────────────────────────────────────────
    // The G2 display is 576 SDK units wide, which corresponds to 40 monospace
    // characters. CHAR_PX is used to convert character counts to pixel positions
    // when placing the right-hand container.
    const DISPLAY_W = 576;
    const CHAR_PX   = 14.4; // DISPLAY_W / 40 chars

    // ── Helpers ───────────────────────────────────────────────────────────────

    // Format fuel to 3 significant figures (e.g. 34.5 → "34.5", 7.08 → "7.08").
    function fuelStr(n) {
      return parseFloat(n.toPrecision(3)).toString();
    }

    // Build the text content for both display containers.
    //
    // The G2 display uses two overlapping containers:
    //   Container 1 — full display width (576px), holds the centered flight
    //                 number on line 1 and left-column data on lines 2–5.
    //   Container 2 — right-side overlay, positioned just past the longest
    //                 left-column line plus a small gap, holds block time,
    //                 min takeoff fuel, and FA 3/4 on lines 2–5.
    //
    // Using two pixel-positioned containers (rather than space-padding a single
    // string) gives reliable column alignment regardless of content length.
    function buildContainers(flt, orig, dest, blockHrs, fuel, minTo, fas) {
      // Convert decimal hours to H:MM display string
      const h = Math.floor(blockHrs);
      const m = Math.round((blockHrs % 1) * 60);
      const blockStr = `${h}:${String(m).padStart(2, '0')}`;

      const crew = fas.map(n => n.trim());
      const mintoStr = `MINTO ${fuelStr(minTo)}`;

      // Left column lines 2–5 (used to calculate the right container's x offset)
      const leftTexts = [
        `${orig.toUpperCase()} \u2192 ${dest.toUpperCase()}`,
        `RLS ${fuelStr(fuel)}`,
        crew[0] || '',
        crew[1] || '',
      ];

      // Right container starts just after the longest left line + a gap
      const maxLeftLen = Math.max(...leftTexts.map(s => s.length), 1);
      const GAP = 4; // character-widths of spacing between columns
      const leftPx  = Math.ceil((maxLeftLen + GAP) * CHAR_PX);
      const rightPx = DISPLAY_W - leftPx;

      // Center the flight number across the full 40-char display width
      const fltStr = 'AAL' + flt;
      const fltPad = Math.floor((40 - fltStr.length) / 2);
      const fltCentered = ' '.repeat(Math.max(0, fltPad)) + fltStr;

      const leftLines  = [fltCentered, ...leftTexts];
      const rightLines = ['', blockStr, mintoStr, crew[2] || '', crew[3] || ''];

      return {
        leftContent:  leftLines.join('\n'),
        rightContent: rightLines.join('\n'),
        leftPx, rightPx,
      };
    }

    // ── Send ──────────────────────────────────────────────────────────────────

    window.sendToGlasses = async function() {
      const status = document.getElementById('status');
      status.style.display = 'none';

      // Collect and parse form values
      const flt   = document.getElementById('flt').value.trim();
      const orig  = document.getElementById('orig').value.trim();
      const dest  = document.getElementById('dest').value.trim();

      // Accept flight time as H:MM or as a decimal hour
      const blockRaw = document.getElementById('block').value.trim();
      const blockParts = blockRaw.split(':');
      const block = blockParts.length === 2
        ? (parseInt(blockParts[0]) || 0) + (parseInt(blockParts[1]) || 0) / 60
        : parseFloat(blockRaw) || 0;

      const fuel  = parseFloat(document.getElementById('fuel').value) || 0;
      const minto = parseFloat(document.getElementById('minto').value) || 0;

      if (!flt || !orig || !dest) {
        status.textContent = 'Fill in flight, origin, and destination.';
        status.className = 'err';
        status.style.display = 'block';
        return;
      }

      const fas = ['fa1','fa2','fa3','fa4'].map(id => document.getElementById(id).value.trim());
      const { leftContent, rightContent, leftPx, rightPx } =
        buildContainers(flt, orig, dest, block, fuel, minto, fas);

      // Preview mode: no bridge, just show the formatted text in the status area
      if (!bridge) {
        status.textContent = 'No bridge — left:\n' + leftContent + '\n\nright:\n' + rightContent;
        status.className = 'ok';
        status.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        // createStartUpPageContainer sends content to the G2 startup/dashboard display.
        // containerTotalNum must match the number of objects in textObject.
        // Container 1 spans the full display width so the centered flight number
        // renders correctly; container 2 overlays on top for right-column alignment.
        const result = await bridge.createStartUpPageContainer({
          containerTotalNum: 2,
          textObject: [
            {
              containerID: 1, containerName: 'left',
              xPosition: 0, yPosition: 0,
              width: DISPLAY_W, height: 136,
              paddingLength: 0,
              isEventCapture: 1,
              content: leftContent,
            },
            {
              containerID: 2, containerName: 'right',
              xPosition: leftPx, yPosition: 0,
              width: rightPx, height: 136,
              paddingLength: 0,
              content: rightContent,
            },
          ]
        });

        status.textContent = result === 0 ? 'Sent successfully!' : `Sent (result: ${result})`;
        status.className = 'ok';
      } catch(e) {
        status.textContent = 'Error: ' + e;
        status.className = 'err';
      }

      status.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '→ Send to Glasses';
    };
  </script>
</body>
</html>
